<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteApp Mini</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .card { background-color: var(--tg-theme-secondary-bg-color); }
        .btn-main { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); }
    </style>
</head>
<body class="p-4 font-sans">
    <div id="app" class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">Заметки PRO</h1>
            <span id="user-name" class="text-sm opacity-70"></span>
        </header>

        <!-- Главное меню -->
        <div id="main-menu" class="grid grid-cols-2 gap-4">
            <button onclick="showView('create')" class="card p-6 rounded-2xl flex flex-col items-center shadow-lg">
                <span class="text-3xl mb-2">📝</span>
                <span class="text-xs font-semibold">Создать</span>
            </button>
            <button onclick="showView('list')" class="card p-6 rounded-2xl flex flex-col items-center shadow-lg">
                <span class="text-3xl mb-2">📋</span>
                <span class="text-xs font-semibold">Список</span>
            </button>
            <button onclick="showView('list')" class="card p-6 rounded-2xl flex flex-col items-center shadow-lg">
                <span class="text-3xl mb-2">🗑</span>
                <span class="text-xs font-semibold">Удалить</span>
            </button>
            <button onclick="showView('create')" class="card p-6 rounded-2xl flex flex-col items-center shadow-lg">
                <span class="text-3xl mb-2">⏰</span>
                <span class="text-xs font-semibold">Напомнить</span>
            </button>
        </div>

        <!-- Вид: Создание -->
        <div id="view-create" class="hidden space-y-4">
            <h2 class="text-xl font-bold mb-4">Новая заметка</h2>
            <textarea id="note-text" class="w-full p-4 rounded-xl card border-none focus:ring-2 focus:ring-blue-500" rows="4" placeholder="Текст заметки..."></textarea>
            <div class="space-y-2">
                <label class="text-sm opacity-70">Дата и время (опционально):</label>
                <input type="datetime-local" id="note-time" class="w-full p-3 rounded-xl card border-none">
            </div>
            <button onclick="saveNote()" class="btn-main w-full py-4 rounded-xl font-bold shadow-md">СОХРАНИТЬ</button>
            <button onclick="showView('menu')" class="w-full py-2 opacity-50">Отмена</button>
        </div>

        <!-- Вид: Список -->
        <div id="view-list" class="hidden">
            <h2 class="text-xl font-bold mb-4">Ваши записи</h2>
            <div id="notes-container" class="space-y-3">
                <!-- Заметки попадут сюда -->
            </div>
            <button onclick="showView('menu')" class="btn-main w-full py-4 rounded-xl font-bold mt-6">В МЕНЮ</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Пользователь";

        let notes = JSON.parse(localStorage.getItem('notes') || '[]');

        function showView(view) {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('view-create').classList.add('hidden');
            document.getElementById('view-list').classList.add('hidden');

            if(view === 'menu') document.getElementById('main-menu').classList.remove('hidden');
            else if(view === 'create') document.getElementById('view-create').classList.remove('hidden');
            else if(view === 'list') {
                document.getElementById('view-list').classList.remove('hidden');
                renderNotes();
            }
        }

        function saveNote() {
            const text = document.getElementById('note-text').value;
            const time = document.getElementById('note-time').value;
            if(!text) return alert("Введите текст");

            const newNote = { id: Date.now(), text, time };
            notes.push(newNote);
            localStorage.setItem('notes', JSON.stringify(notes));

            // Отправляем данные боту, чтобы он поставил напоминание
            tg.sendData(JSON.stringify(newNote));
            tg.close();
        }

        function renderNotes() {
            const container = document.getElementById('notes-container');
            container.innerHTML = notes.length ? '' : '<p class="opacity-50 text-center">Заметок пока нет</p>';
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'card p-4 rounded-xl flex justify-between items-start';
                div.innerHTML = `
                    <div>
                        <p class="font-medium">${n.text}</p>
                        <p class="text-xs opacity-50">${n.time ? n.time.replace('T', ' ') : 'Без времени'}</p>
                    </div>
                    <button onclick="deleteNote(${n.id})" class="text-red-500">✕</button>
                `;
                container.appendChild(div);
            });
        }

        function deleteNote(id) {
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('notes', JSON.stringify(notes));
            renderNotes();
        }
    </script>
</body>
</html>
